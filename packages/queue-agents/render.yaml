# queue-agents. Web + Background Worker + Valkey + Postgres.
# Builds from the repo root so the npm workspaces resolve.

projects:
  - name: milamanzarek-agents-workshop-queue
    environments:
      - name: production
        databases:
          - name: milamanzarek-queue-agents-db
            plan: basic-256mb
            region: oregon
            postgresMajorVersion: "18"

        services:
          # Shared queue + progress bus.
          - type: keyvalue
            name: milamanzarek-queue-agents-valkey
            plan: starter
            region: oregon
            maxmemoryPolicy: noeviction
            ipAllowList: []

          # Producer: enqueues jobs, serves the UI, streams progress.
          - type: web
            name: milamanzarek-queue-agents-web
            runtime: node
            region: oregon
            plan: starter
            buildCommand: npm ci
            startCommand: npm run start --workspace @workshop/queue-agents
            healthCheckPath: /healthz
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: milamanzarek-queue-agents-db
                  property: connectionString
              - key: VALKEY_URL
                fromService:
                  name: milamanzarek-queue-agents-valkey
                  type: keyvalue
                  property: connectionString
              - key: NODE_ENV
                value: production

          # Consumer: runs the agent. Scale `numInstances` up to fan out across PRs.
          - type: worker
            name: milamanzarek-queue-agents-worker
            runtime: node
            region: oregon
            plan: starter
            numInstances: 1
            buildCommand: npm ci
            startCommand: npm run start:worker --workspace @workshop/queue-agents
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: milamanzarek-queue-agents-db
                  property: connectionString
              - key: VALKEY_URL
                fromService:
                  name: milamanzarek-queue-agents-valkey
                  type: keyvalue
                  property: connectionString
              - key: NODE_ENV
                value: production
